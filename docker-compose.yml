services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ha-njord-dev
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - ha-config:/config
      - ./custom_components/njord:/config/custom_components/njord:ro
    environment:
      - TZ=Europe/Zurich

  njord:
    image: njord:local
    container_name: njord-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - njord-data:/app/data
    environment:
      # ── Locations ─────────────────────────────────────────────
      - Njord__Locations__0__Name=amsterdam
      - Njord__Locations__0__Latitude=52.3676
      - Njord__Locations__0__Longitude=4.9041
      - Njord__Locations__0__Models__0=knmi_harmonie_arome_netherlands

      - Njord__Locations__1__Name=berlin
      - Njord__Locations__1__Latitude=52.5200
      - Njord__Locations__1__Longitude=13.4050
      - Njord__Locations__1__Models__0=icon_d2

      - Njord__Locations__2__Name=bern
      - Njord__Locations__2__Latitude=46.9480
      - Njord__Locations__2__Longitude=7.4474
      - Njord__Locations__2__Models__0=meteoswiss_icon_ch1
      - Njord__Locations__2__Models__1=meteoswiss_icon_ch2

      # ── Forecast ──────────────────────────────────────────────
      - Njord__ForecastDays=16
      - Njord__Horizons__0=3
      - Njord__Horizons__1=6
      - Njord__Horizons__2=12
      - Njord__Horizons__3=24
      - Njord__Horizons__4=48
      - Njord__Horizons__5=72
      - Njord__Horizons__6=96

      # ── Models (global, applied to all locations) ─────────────
      - Njord__Models__0=icon_global
      - Njord__Models__1=icon_eu
      - Njord__Models__2=ecmwf_ifs025
      - Njord__Models__3=gfs_seamless
      - Njord__Models__4=ukmo_seamless
      - Njord__Models__5=arpege_europe
      - Njord__Models__6=knmi_harmonie_arome_europe
      - Njord__Models__7=dmi_harmonie_arome_europe

      # ── Parameters ────────────────────────────────────────────
      - Njord__Parameters__Groups__0=Weather
      - Njord__Parameters__Groups__1=Solar
      - Njord__Parameters__Groups__2=Soil

      # ── Enrichment ────────────────────────────────────────────
      - Njord__Enrichment__Consensus__Enabled=true
      - Njord__Enrichment__Alerts__Enabled=true
      - Njord__Enrichment__Derived__Enabled=true
      - Njord__Enrichment__Trends__Enabled=true
      - Njord__Enrichment__Indices__Enabled=true
      - Njord__Enrichment__Energy__Enabled=true
      - Njord__Enrichment__History__Enabled=true

volumes:
  ha-config:
  njord-data:
