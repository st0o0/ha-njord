name: Bug Report
description: Report a bug with the njord integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2025.1.0"
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: ha-njord version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output from Home Assistant.
      render: text

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: How is your njord instance configured? (locations, models, etc.)
